<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Gallery-specific styles */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }
    
    .gallery-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid #222;
      backdrop-filter: blur(8px);
    }
    
    .gallery-logo {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #c8ff00;
    }
    
    .back-link {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      text-decoration: none;
    }
    
    .back-link:hover {
      color: #e8e8e8;
    }
    
    .gallery-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 2rem;
      background: linear-gradient(180deg, #0a0a12 0%, #000000 100%);
    }
    
    .gallery-title {
      font-family: Georgia, serif;
      font-size: 2.5rem;
      color: #e8e8e8;
      margin-bottom: 2rem;
      text-align: center;
    }
    
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1000px;
      width: 100%;
    }
    
    .scene-card {
      background: rgba(20, 20, 30, 0.7);
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }
    
    .scene-card:hover {
      background: rgba(30, 30, 50, 0.9);
      border-color: #c8ff00;
      transform: translateY(-2px);
    }
    
    .scene-card h3 {
      font-family: Georgia, serif;
      font-size: 1.4rem;
      color: #c8ff00;
      margin-top: 0;
      margin-bottom: 0.75rem;
    }
    
    .scene-card p {
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    
    .scene-card::after {
      content: "→";
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      color: #c8ff00;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="gallery-nav">
    <a href="index.html" class="back-link">← Back to Home</a>
    <div class="gallery-logo">3D GALLERY</div>
  </div>

  <div class="gallery-container">
    <h1 class="gallery-title">Explore 3D Scenes</h1>

    <div class="scene-grid">
      <a href="forest-scene.html" class="scene-card">
        <h3>Forest Scene</h3>
        <p>A procedural forest with trees, hills, and dynamic sky. Use your mouse to orbit and explore.</p>
      </a>

      <a href="space-scene.html" class="scene-card">
        <h3>Outer Space</h3>
        <p>Stars, asteroids, and cosmic dust. Navigate with your mouse and scroll to zoom.</p>
      </a>
    </div>
  </div>
</body>
</html>
